<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вайб — Профиль</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="style-additions.css">
</head>
<body>
    <canvas id="bg-canvas"></canvas>
    <script src="background.js" defer></script>
    <script src="parallax.js" defer></script>
    <script src="page-transitions.js" defer></script>
    <div class="notification-container" id="notification-container"></div>

    <!-- Кнопка-облачко для отзыва -->
    <button class="feedback-bubble" id="feedback-bubble">
        <span>✍️</span> Написать отзыв
    </button>

    <div class="container">
        <header>
            <div class="logo">Вайб</div>
            <div class="header-right">
                <a href="download.html" class="reviews-btn">Скачать</a>
                <a href="pricing.html" class="reviews-btn">Тарифы</a>
                <a href="index.html" class="reviews-btn">Главная</a>
                <div id="user-avatar-container" style="display: none;">
                    <img id="user-avatar-img" src="" alt="avatar" class="user-avatar">
                </div>
                <button class="login-btn" id="login-btn">Войти</button>
            </div>
        </header>

        <main>
            <div class="profile-info" id="profile-container">
                <div style="text-align: center; color: var(--text-dim);">Загрузка...</div>
            </div>
        </main>

        <!-- Модальное окно админ-панели -->
        <div class="modal-overlay" id="admin-modal-overlay" style="display: none;"></div>
        <div class="modal" id="admin-modal" style="display: none;">
            <div class="modal-header">
                <h2>Управление подписками</h2>
                <button class="modal-close" id="close-admin-modal">&times;</button>
            </div>
            <div class="modal-body">
                <input type="text" id="admin-search" placeholder="Поиск по email..." style="margin-bottom: 20px; width: 100%;">
                <div id="admin-users-list" style="max-height: 400px; overflow-y: auto;"></div>
            </div>
        </div>

        <!-- Модальное окно редактирования профиля -->
        <div class="modal-overlay" id="edit-profile-overlay" style="display: none;"></div>
        <div class="modal" id="edit-profile-modal" style="display: none;">
            <div class="modal-header">
                <h2>Редактировать профиль</h2>
                <button class="modal-close" id="close-edit-profile">&times;</button>
            </div>
            <div class="modal-body">
                <form id="edit-profile-form">
                    <label style="color:var(--text-secondary);">Имя</label>
                    <input type="text" id="edit-name" placeholder="Ваше имя" required>
                    
                    <label style="color:var(--text-secondary); margin-top:10px;">Аватарка</label>
                    <input type="file" id="edit-avatar" accept="image/*" style="margin-bottom:10px;">
                    <div id="avatar-preview" style="width:80px; height:80px; border-radius:50%; overflow:hidden; margin-bottom:10px; border:2px solid var(--border-accent);">
                        <img id="avatar-img" src="" style="width:100%; height:100%; object-fit:cover; display:none;">
                        <div id="avatar-placeholder" style="width:100%; height:100%; background:linear-gradient(135deg,var(--accent),var(--accent-2)); display:flex; align-items:center; justify-content:center; font-size:2rem; color:#fff;">?</div>
                    </div>
                    
                    <button type="submit">Сохранить</button>
                </form>
            </div>
        </div>

        <footer>
            <div class="secret-note">Возможно подстройка под ваш характер ;)</div>
            <div>DESIGNED BY REUZ0201 &copy; 2026</div>
        </footer>
    </div>

    <!-- Общий overlay для модалок (настройки) -->
    <div class="modal-overlay" id="modal-overlay"></div>

    <!-- Модалка входа -->
    <div class="modal" id="login-modal">
        <div class="modal-header">
            <h2>Вход</h2>
            <button class="modal-close" id="close-login">&times;</button>
        </div>
        <div class="modal-body">
            <form id="login-form">
                <input type="email" id="login-email" placeholder="Email" required>
                <div class="password-wrapper">
                    <input type="password" id="login-password" placeholder="Пароль" required>
                    
                </div>
                <button type="submit">Войти</button>
                <button type="button" class="forgot-password" id="forgot-password-btn">Забыли пароль?</button>
            </form>
            <p>Нет аккаунта? <a id="switch-to-register" class="switch-link">Зарегистрироваться</a></p>
        </div>
    </div>

    <!-- Модалка регистрации -->
    <div class="modal" id="register-modal">
        <div class="modal-header">
            <h2>Регистрация</h2>
            <button class="modal-close" id="close-register">&times;</button>
        </div>
        <div class="modal-body">
            <div id="register-step1">
                <form id="register-form-step1">
                    <input type="text" id="register-name" placeholder="Имя" required>
                    <input type="email" id="register-email" placeholder="Email" required>
                    <div class="password-wrapper">
                        <input type="password" id="register-password" placeholder="Пароль" required>
                        
                    </div>
                    <div class="password-wrapper">
                        <input type="password" id="register-confirm" placeholder="Подтверждение пароля" required>
                        
                    </div>
                    <button type="submit">Зарегистрироваться</button>
                </form>
            </div>
            <div id="register-step2" style="display: none;">
                <p>На ваш email отправлен код подтверждения.</p>
                <input type="text" id="verification-code" placeholder="Введите код">
                <button id="verify-code">Подтвердить</button>
            </div>
        </div>
    </div>

    <!-- Модальное окно настроек -->
    <div class="modal" id="settings-modal">
        <div class="modal-header">
            <h2>Настройки</h2>
            <button class="modal-close" id="close-settings">&times;</button>
        </div>
        <div class="modal-body">
            <div class="setting-item">
                <label>Тема оформления</label>
                <div class="theme-toggle">
                    <button id="theme-dark" class="active">Тёмная</button>
                    <button id="theme-light">Светлая</button>
                </div>
            </div>
            <div class="setting-item">
                <label>Количество частиц на фоне</label>
                <select id="particle-count">
                    <option value="90">Обычно</option>
                    <option value="30">Мало</option>
                    <option value="0">Отключить</option>
                </select>
            </div>
        </div>
    </div>

    <!-- Выпадающее меню аватарки -->
    <div class="dropdown-menu" id="dropdown-menu">
        <a href="profile.html" class="dropdown-item">Профиль</a>
        <a href="#" class="dropdown-item" id="settings-menu-item">Настройки</a>
        <button class="dropdown-item" id="dropdown-logout">Выйти</button>
    </div>

    <script type="module" src="profile.js"></script>
    <script>
        document.addEventListener("click", function(e) {
            if (!e.target.classList.contains("toggle-password")) return;
            var input = e.target.previousElementSibling;
            if (!input) return;
            var isPassword = input.type === "password";
            input.type = isPassword ? "text" : "password";
            e.target.textContent = isPassword ? "🙈" : "👁";
        });
    </script>
</body>
</html>
